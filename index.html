<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bingo 2026 - 친구들과 1년 빙고</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Nunito:wght@500;700;900&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="./assets/icons/favicon.svg">
  <link rel="stylesheet" href="./assets/css/main.css">
</head>

<body>
  <div class="ambient-bg" aria-hidden="true">
    <span class="orb orb-a"></span>
    <span class="orb orb-b"></span>
    <span class="orb orb-c"></span>
  </div>

  <div class="wrap">
    <header class="hero">
      <h1>✦ Bingo 2026 ✦</h1>
      <div class="subtitle">혜지, 현준, 혜빈, 승덕이 함께하는 5x5 빙고. 3줄 먼저 완성하면 승리!</div>
      <div class="countdown" id="countdownTimer">2026년 12월 31일까지 남은 시간 계산 중...</div>
    </header>

    <div class="layout">
      <aside class="card">
        <h2>내 프로필</h2>
        <div class="current-profile-pill sidebar">
          <div id="currentProfileAvatar" class="avatar-circle">🦥</div>
          <div id="currentProfile" class="profile-status">로그인 없음</div>
        </div>
        <div class="row login-row">
          <select id="profileSelect" class="input">
            <option value="jeon_seungdeok">전승덕</option>
            <option value="jeon_hyeji">전혜지</option>
            <option value="seo_hyeonjun">서현준</option>
            <option value="joo_hyebin">주혜빈</option>
          </select>
          <button id="createOrLoadBtn" class="btn">로그인</button>
        </div>
        <p class="small" style="margin:8px 0 0;">내 프로필로 로그인한 경우에만 내 빙고판 체크/수정이 가능합니다.</p>
        <p class="small" style="margin:6px 0 0;">다른 사람 빙고판은 조회만 가능하며 수정은 잠겨있습니다.</p>

        <h3 style="margin-top:16px;">참여자 빙고판</h3>
        <div id="playerList" class="player-list"></div>
      </aside>

      <main class="card">
        <div id="boardContainer"></div>
      </main>
    </div>
  </div>

  <div id="editModal" class="modal-backdrop hidden" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <h3 id="modalTitle">칸 편집</h3>
        <button id="modalCloseBtn" class="modal-close" type="button" aria-label="닫기">✕</button>
      </div>
      <div class="small">선택한 칸의 이모티콘과 내용을 수정하세요.</div>
      <div class="editor-grid" style="margin-top:10px;">
        <label for="emojiInput">이모티콘</label>
        <div class="row wrap">
          <input id="emojiInput" class="input" type="text" maxlength="4" placeholder="예: 🌟" />
        </div>
        <label>빠른 선택</label>
        <div id="emojiQuickPick" class="emoji-grid"></div>
        <label for="textInput">내용</label>
        <textarea id="textInput" class="textarea" rows="3" maxlength="40" placeholder="예: 주 3회 운동"></textarea>
      </div>
      <div class="row" style="margin-top:12px; justify-content:flex-end;">
        <button id="modalCancelBtn" class="btn secondary" type="button">취소</button>
        <button id="saveCellBtn" class="btn" type="button">저장</button>
      </div>
      <div class="small" style="margin-top:10px;">iPhone에서는 입력창을 누르면 이모티콘 키보드로 직접 입력할 수 있고, 아래 빠른 선택도 가능합니다.</div>
    </div>
  </div>

  <div id="warningModal" class="modal-backdrop hidden" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="warningModalTitle">
      <div class="modal-head">
        <h3 id="warningModalTitle">안내</h3>
        <button id="warningModalCloseBtn" class="modal-close" type="button" aria-label="닫기">✕</button>
      </div>
      <div id="warningModalMessage" class="small">메시지</div>
      <div class="row" style="margin-top:12px; justify-content:flex-end;">
        <button id="warningModalOkBtn" class="btn" type="button">확인</button>
      </div>
    </div>
  </div>

  <div id="successFlash" class="success-flash hidden" aria-hidden="true">
    <img src="./assets/images/success.png" alt="Success" />
  </div>
  <div id="checkFlash" class="check-flash hidden" aria-hidden="true">
    <img src="./assets/images/check.png" alt="Check" />
  </div>

  <div class="music-widget-floating">
    <div class="music-preview" aria-hidden="true">
      <video id="bgmPreviewVideo" class="music-preview-video" autoplay muted loop playsinline webkit-playsinline preload="auto"
        src="./assets/videos/music-preview-loop.mov"></video>
    </div>
    <div class="music-head compact">
      <strong>BGM</strong>
      <span id="musicStatus" class="small">로딩 중...</span>
    </div>
    <div class="row wrap" style="margin-top:6px;">
      <button id="musicPlayBtn" class="icon-btn" type="button" aria-label="재생" title="재생">▶</button>
      <button id="musicPauseBtn" class="icon-btn" type="button" aria-label="일시정지" title="일시정지">⏸</button>
      <button id="musicMuteBtn" class="icon-btn" type="button" aria-label="음소거" title="음소거">🔇</button>
    </div>
    <input id="musicVolume" type="range" min="0" max="100" value="35" class="volume-range compact" />
    <div id="ytPlayerHost" aria-hidden="true"></div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="./assets/js/data.js"></script>
  <script defer src="./assets/js/game.js"></script>
  <script defer src="./assets/js/supabase-config.js"></script>
  <script defer src="./assets/js/app.js"></script>
</body>

</html>
