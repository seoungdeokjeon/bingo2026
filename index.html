<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>로또 번호 추첨기</title>
  <style>
    :root {
      --bg: #f0f4f8;
      --card: #ffffff;
      --text: #333333;
      --muted: #666666;
      --accent: #007bff;
      --good: #28a745;
      --bad: #dc3545;
      --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      padding: 20px;
    }

    .wrap {
      max-width: 800px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    h1 {
      margin: 0;
      font-size: 2.5rem;
      color: var(--accent);
    }

    .subtitle {
      color: var(--muted);
      font-size: 1.1rem;
      margin-top: 10px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 20px;
    }

    .btn {
      appearance: none;
      border: none;
      cursor: pointer;
      padding: 12px 24px;
      border-radius: var(--radius);
      color: white;
      background: var(--accent);
      font-weight: 600;
      font-size: 1rem;
      transition: background 0.3s ease;
      margin: 10px;
    }

    .btn:hover {
      background: #0056b3;
    }

    .btn.secondary {
      background: #6c757d;
    }

    .btn.secondary:hover {
      background: #545b62;
    }

    .numbers {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin: 20px 0;
    }

    .number-ball {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.2rem;
      color: white;
      background: linear-gradient(135deg, #ff6b6b, #feca57);
    }

    .bonus-ball {
      background: linear-gradient(135deg, #48cae4, #023e8a);
    }

    .history {
      margin-top: 30px;
    }

    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px;
      border-bottom: 1px solid #eee;
    }

    .history-numbers {
      display: flex;
      gap: 5px;
    }

    .small-ball {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      color: white;
      background: #ccc;
    }

    .date {
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <h1>로또 번호 추첨기</h1>
      <div class="subtitle">행운의 번호를 생성해보세요!</div>
    </header>

    <div class="card">
      <h2>번호 추첨</h2>
      <div id="numbers" class="numbers">
        <!-- 번호가 여기에 표시됩니다 -->
      </div>
      <div style="text-align: center;">
        <button class="btn" id="generateBtn">번호 생성</button>
        <button class="btn secondary" id="clearBtn">초기화</button>
      </div>
    </div>

    <div class="card history">
      <h2>추첨 기록</h2>
      <div id="history">
        <!-- 기록이 여기에 표시됩니다 -->
      </div>
    </div>
  </div>

  <script>
    const LS_KEY = "lotto_history";

    function getRandomNumbers() {
      const numbers = [];
      while (numbers.length < 6) {
        const num = Math.floor(Math.random() * 45) + 1;
        if (!numbers.includes(num)) {
          numbers.push(num);
        }
      }
      numbers.sort((a, b) => a - b);
      const bonus = Math.floor(Math.random() * 45) + 1;
      while (numbers.includes(bonus)) {
        bonus = Math.floor(Math.random() * 45) + 1;
      }
      return { main: numbers, bonus };
    }

    function displayNumbers({ main, bonus }) {
      const container = document.getElementById('numbers');
      container.innerHTML = '';
      main.forEach(num => {
        const ball = document.createElement('div');
        ball.className = 'number-ball';
        ball.textContent = num;
        container.appendChild(ball);
      });
      const bonusBall = document.createElement('div');
      bonusBall.className = 'number-ball bonus-ball';
      bonusBall.textContent = bonus;
      bonusBall.style.marginLeft = '20px';
      container.appendChild(bonusBall);
    }

    function saveHistory(numbers) {
      const history = JSON.parse(localStorage.getItem(LS_KEY) || '[]');
      history.unshift({
        numbers,
        date: new Date().toLocaleString('ko-KR')
      });
      if (history.length > 10) history.pop(); // 최근 10개만 저장
      localStorage.setItem(LS_KEY, JSON.stringify(history));
      displayHistory();
    }

    function displayHistory() {
      const history = JSON.parse(localStorage.getItem(LS_KEY) || '[]');
      const container = document.getElementById('history');
      container.innerHTML = '';
      if (history.length === 0) {
        container.innerHTML = '<p>아직 추첨 기록이 없습니다.</p>';
        return;
      }
      history.forEach(item => {
        const itemDiv = document.createElement('div');
        itemDiv.className = 'history-item';
        const numbersDiv = document.createElement('div');
        numbersDiv.className = 'history-numbers';
        item.numbers.main.forEach(num => {
          const ball = document.createElement('div');
          ball.className = 'small-ball';
          ball.textContent = num;
          numbersDiv.appendChild(ball);
        });
        const bonusBall = document.createElement('div');
        bonusBall.className = 'small-ball';
        bonusBall.textContent = item.numbers.bonus;
        bonusBall.style.background = 'linear-gradient(135deg, #48cae4, #023e8a)';
        numbersDiv.appendChild(bonusBall);
        const dateDiv = document.createElement('div');
        dateDiv.className = 'date';
        dateDiv.textContent = item.date;
        itemDiv.appendChild(numbersDiv);
        itemDiv.appendChild(dateDiv);
        container.appendChild(itemDiv);
      });
    }

    document.getElementById('generateBtn').addEventListener('click', () => {
      const numbers = getRandomNumbers();
      displayNumbers(numbers);
      saveHistory(numbers);
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      document.getElementById('numbers').innerHTML = '';
    });

    // 초기 로드 시 기록 표시
    displayHistory();
  </script>
</body>

</html>
